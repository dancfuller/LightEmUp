<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LightEmUp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1e; overflow-x: hidden; }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: #fff;
      cursor: pointer; border: 2px solid #6366f1;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; cursor: pointer; border: 2px solid #6366f1;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }
    select { -webkit-appearance: auto; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

const API = "/api";

// ─── Color Utilities ────────────────────────────────────────────────────────

function hsvToRgb(h, s, v) {
  let r, g, b;
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
}

// ─── API Helpers ────────────────────────────────────────────────────────────

async function api(path, options = {}) {
  try {
    const res = await fetch(`${API}${path}`, {
      headers: { "Content-Type": "application/json" },
      ...options,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    return await res.json();
  } catch (e) {
    console.error(`API ${path}:`, e);
    throw e;
  }
}

// ─── Favorite Colors (persisted via backend config) ─────────────────────────

// ─── Device Name Helpers ────────────────────────────────────────────────────

// SKU subset for devices likely on this network. Full table is in discovery.py.
const GOVEE_SKU_NAMES = {
  "H6061": "Glide Hexa Light Panels",
  "H61D3": "Neon Rope Light 2",
  "H60A6": "Ceiling Light Pro",
  "H7065": "Outdoor Spot Lights 2-Pack",
  "H7066": "Outdoor Spot Lights 4-Pack",
  "H70C1": "Christmas String Lights 2 10M",
};

function getDeviceDisplayName(device, nicknames) {
  const deviceKey = device.type === "hue" ? `hue:${device.id}` : `govee:${device.ip}`;
  const nickname = nicknames?.[deviceKey] || "";
  const friendlyName = device.type === "hue"
    ? (device.product_name || device.name || device.model || `Light ${device.id}`)
    : (GOVEE_SKU_NAMES[device.sku] || device.name || device.sku || "Govee Device");
  return { nickname, friendlyName, deviceKey };
}

// ─── Color Conversion Helpers ───────────────────────────────────────────────

function hueXYToRGB(xy, bri) {
  // Convert Hue CIE xy + brightness to RGB
  if (!xy || xy.length < 2) return null;
  const [x, y] = xy;
  const z = 1.0 - x - y;
  const Y = (bri || 254) / 254;
  const X = (Y / y) * x;
  const Z = (Y / y) * z;
  // Wide RGB D65 conversion
  let r = X * 1.656492 - Y * 0.354851 - Z * 0.255038;
  let g = -X * 0.707196 + Y * 1.655397 + Z * 0.036152;
  let b = X * 0.051713 - Y * 0.121364 + Z * 1.011530;
  // Gamma correction
  r = r <= 0.0031308 ? 12.92 * r : (1.0 + 0.055) * Math.pow(r, 1.0 / 2.4) - 0.055;
  g = g <= 0.0031308 ? 12.92 * g : (1.0 + 0.055) * Math.pow(g, 1.0 / 2.4) - 0.055;
  b = b <= 0.0031308 ? 12.92 * b : (1.0 + 0.055) * Math.pow(b, 1.0 / 2.4) - 0.055;
  return {
    r: Math.max(0, Math.min(255, Math.round(r * 255))),
    g: Math.max(0, Math.min(255, Math.round(g * 255))),
    b: Math.max(0, Math.min(255, Math.round(b * 255))),
  };
}

function hueSatToRGB(hue, sat) {
  // Convert Hue hue (0-65535) + sat (0-254) to RGB
  if (hue == null || sat == null) return null;
  const h = hue / 65535;
  const s = sat / 254;
  const v = 1;
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  let r, g, b;
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  return {
    r: Math.max(0, Math.min(255, Math.round(r * 255))),
    g: Math.max(0, Math.min(255, Math.round(g * 255))),
    b: Math.max(0, Math.min(255, Math.round(b * 255))),
  };
}

function getInitialColor(light) {
  if (light.type === "govee" && light.state?.color) {
    const c = light.state.color;
    if (c.r != null) return { r: c.r, g: c.g, b: c.b };
  }
  if (light.type === "hue" && light.state) {
    // Prefer xy if available
    if (light.state.xy) {
      return hueXYToRGB(light.state.xy, light.state.brightness);
    }
    // Fall back to hue/sat
    if (light.state.hue != null && light.state.saturation != null) {
      return hueSatToRGB(light.state.hue, light.state.saturation);
    }
  }
  return null;
}

const STORAGE_KEY = "lightemup_fav_colors";

function loadFavoriteColors() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return [
    { r: 255, g: 180, b: 100, label: "Warm" },
    { r: 180, g: 210, b: 255, label: "Cool" },
    { r: 255, g: 245, b: 228, label: "Daylight" },
    { r: 255, g: 40, b: 40, label: "Red" },
    { r: 40, g: 80, b: 255, label: "Blue" },
    { r: 40, g: 220, b: 80, label: "Green" },
    { r: 160, g: 50, b: 255, label: "Purple" },
    { r: 255, g: 120, b: 20, label: "Orange" },
  ];
}

function saveFavoriteColors(favs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(favs)); } catch {}
}

// ─── Shared Color Picker ────────────────────────────────────────────────────

function RgbSliderInput({ label, value, onChange, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ fontSize: 11, fontWeight: 700, color, width: 12, textAlign: "center" }}>{label}</span>
      <input
        type="range" min={0} max={255} value={value}
        onChange={(e) => onChange(Number(e.target.value))}
        style={{
          flex: 1, height: 5, appearance: "none", borderRadius: 3,
          background: `linear-gradient(to right, ${
            label === "R" ? `rgb(0,${value > 128 ? 0 : 0},${value > 128 ? 0 : 0}), rgb(255,0,0)` :
            label === "G" ? `rgb(0,0,0), rgb(0,255,0)` :
            `rgb(0,0,0), rgb(0,0,255)`
          })`,
          cursor: "pointer", outline: "none",
        }}
      />
      <input
        type="number" min={0} max={255} value={value}
        onChange={(e) => {
          const v = Math.max(0, Math.min(255, Number(e.target.value) || 0));
          onChange(v);
        }}
        style={{
          width: 46, padding: "3px 6px", borderRadius: 6,
          border: "1px solid #334155", background: "#0f172a",
          color: "#e2e8f0", fontSize: 12, textAlign: "center", outline: "none",
        }}
      />
    </div>
  );
}

function ColorPicker({ size = 140, currentColor, onColorSelect, favorites, onFavoritesChange, compact = false }) {
  const [mode, setMode] = useState("wheel"); // "wheel" | "rgb" | "favorites"
  const [localR, setLocalR] = useState(currentColor?.r ?? 255);
  const [localG, setLocalG] = useState(currentColor?.g ?? 180);
  const [localB, setLocalB] = useState(currentColor?.b ?? 100);
  const [editingFavs, setEditingFavs] = useState(false);
  const [newFavLabel, setNewFavLabel] = useState("");

  // Sync local RGB when currentColor changes from external source (wheel pick)
  const handleWheelPick = (r, g, b) => {
    setLocalR(r);
    setLocalG(g);
    setLocalB(b);
    onColorSelect(r, g, b);
  };

  const handleRgbChange = (channel, val) => {
    const r = channel === "r" ? val : localR;
    const g = channel === "g" ? val : localG;
    const b = channel === "b" ? val : localB;
    if (channel === "r") setLocalR(val);
    if (channel === "g") setLocalG(val);
    if (channel === "b") setLocalB(val);
    onColorSelect(r, g, b);
  };

  const addCurrentAsFavorite = () => {
    const label = newFavLabel.trim() || `${localR},${localG},${localB}`;
    const updated = [...favorites, { r: localR, g: localG, b: localB, label }];
    onFavoritesChange(updated);
    setNewFavLabel("");
  };

  const removeFavorite = (index) => {
    const updated = favorites.filter((_, i) => i !== index);
    onFavoritesChange(updated);
  };

  const tabStyle = (active) => ({
    padding: compact ? "4px 10px" : "5px 12px", borderRadius: 6, border: "none",
    background: active ? "#334155" : "transparent",
    color: active ? "#e2e8f0" : "#64748b",
    fontSize: 11, fontWeight: 600, cursor: "pointer",
    transition: "all 0.15s",
  });

  return (
    <div>
      {/* Mode tabs */}
      <div style={{
        display: "flex", gap: 2, marginBottom: 10, padding: 2,
        background: "#0f172a", borderRadius: 8,
      }}>
        <button style={tabStyle(mode === "wheel")} onClick={() => setMode("wheel")}>Wheel</button>
        <button style={tabStyle(mode === "rgb")} onClick={() => setMode("rgb")}>RGB</button>
        <button style={tabStyle(mode === "favorites")} onClick={() => setMode("favorites")}>
          Favorites{favorites.length > 0 ? ` (${favorites.length})` : ""}
        </button>
      </div>

      {/* Current color preview */}
      <div style={{
        display: "flex", alignItems: "center", gap: 10, marginBottom: 10,
        padding: "6px 10px", background: "#0f172a", borderRadius: 8,
      }}>
        <div style={{
          width: 28, height: 28, borderRadius: 8, flexShrink: 0,
          background: `rgb(${localR},${localG},${localB})`,
          border: "1px solid rgba(255,255,255,0.1)",
        }} />
        <span style={{ fontSize: 12, color: "#94a3b8" }}>
          R:{localR} G:{localG} B:{localB}
        </span>
        {mode !== "favorites" && (
          <button
            onClick={() => { setMode("favorites"); setEditingFavs(true); }}
            style={{
              marginLeft: "auto", padding: "3px 8px", borderRadius: 6, border: "none",
              background: "rgba(99,102,241,0.15)", color: "#a5b4fc",
              fontSize: 10, fontWeight: 600, cursor: "pointer",
            }}
          >★ Save</button>
        )}
      </div>

      {/* Wheel mode */}
      {mode === "wheel" && (
        <div style={{ display: "flex", justifyContent: "center" }}>
          <ColorWheel size={size} onColorSelect={handleWheelPick} />
        </div>
      )}

      {/* RGB sliders mode */}
      {mode === "rgb" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <RgbSliderInput label="R" value={localR} onChange={(v) => handleRgbChange("r", v)} color="#f87171" />
          <RgbSliderInput label="G" value={localG} onChange={(v) => handleRgbChange("g", v)} color="#4ade80" />
          <RgbSliderInput label="B" value={localB} onChange={(v) => handleRgbChange("b", v)} color="#60a5fa" />
        </div>
      )}

      {/* Favorites mode */}
      {mode === "favorites" && (
        <div>
          {favorites.length === 0 ? (
            <div style={{
              padding: 20, textAlign: "center", color: "#475569", fontSize: 13,
              borderRadius: 10, border: "1px dashed #334155",
            }}>
              No favorites yet. Pick a color and tap ★ Save.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {favorites.map((fav, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 8,
                  padding: "8px 10px", borderRadius: 8,
                  background: "#0f172a", border: "1px solid #1e293b",
                }}>
                  <button
                    onClick={() => {
                      setLocalR(fav.r); setLocalG(fav.g); setLocalB(fav.b);
                      onColorSelect(fav.r, fav.g, fav.b);
                    }}
                    style={{
                      display: "flex", alignItems: "center", gap: 8,
                      background: "none", border: "none", cursor: "pointer",
                      flex: 1, padding: 0, textAlign: "left",
                    }}
                  >
                    <div style={{
                      width: 24, height: 24, borderRadius: 6, flexShrink: 0,
                      background: `rgb(${fav.r},${fav.g},${fav.b})`,
                      border: "1px solid rgba(255,255,255,0.1)",
                    }} />
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0" }}>{fav.label}</div>
                      <div style={{ fontSize: 10, color: "#64748b" }}>{fav.r}, {fav.g}, {fav.b}</div>
                    </div>
                  </button>
                  {editingFavs && (
                    <button
                      onClick={() => removeFavorite(i)}
                      style={{
                        padding: "3px 8px", borderRadius: 6, border: "none",
                        background: "rgba(248,113,113,0.12)", color: "#f87171",
                        fontSize: 11, fontWeight: 600, cursor: "pointer",
                      }}
                    >×</button>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* Add favorite / edit toggle */}
          <div style={{ display: "flex", gap: 6, marginTop: 10, alignItems: "center" }}>
            {editingFavs ? (
              <>
                <div style={{
                  width: 20, height: 20, borderRadius: 5, flexShrink: 0,
                  background: `rgb(${localR},${localG},${localB})`,
                  border: "1px solid rgba(255,255,255,0.1)",
                }} />
                <input
                  type="text" value={newFavLabel}
                  onChange={(e) => setNewFavLabel(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && addCurrentAsFavorite()}
                  placeholder="Label (optional)..."
                  style={{
                    flex: 1, padding: "6px 10px", borderRadius: 8,
                    border: "1px solid #334155", background: "#1e293b",
                    color: "#f1f5f9", fontSize: 12, outline: "none",
                  }}
                />
                <button
                  onClick={addCurrentAsFavorite}
                  style={{
                    padding: "6px 12px", borderRadius: 8, border: "none",
                    background: "#6366f1", color: "#fff",
                    fontSize: 11, fontWeight: 600, cursor: "pointer",
                  }}
                >Add</button>
                <button
                  onClick={() => setEditingFavs(false)}
                  style={{
                    padding: "6px 10px", borderRadius: 8, border: "1px solid #334155",
                    background: "transparent", color: "#94a3b8",
                    fontSize: 11, fontWeight: 600, cursor: "pointer",
                  }}
                >Done</button>
              </>
            ) : (
              <button
                onClick={() => setEditingFavs(true)}
                style={{
                  padding: "6px 12px", borderRadius: 8, border: "1px solid #334155",
                  background: "transparent", color: "#94a3b8",
                  fontSize: 11, fontWeight: 600, cursor: "pointer",
                }}
              >Edit Favorites</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Light & Room Controls ──────────────────────────────────────────────────

function StatusBadge({ connected, label }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      padding: "4px 12px", borderRadius: 20,
      background: connected ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.15)",
      color: connected ? "#4ade80" : "#f87171",
      fontSize: 12, fontWeight: 600, letterSpacing: 0.5,
    }}>
      <span style={{
        width: 7, height: 7, borderRadius: "50%",
        background: connected ? "#4ade80" : "#f87171",
        boxShadow: connected ? "0 0 6px #4ade80" : "none",
      }} />
      {label}
    </span>
  );
}

function ColorWheel({ size = 180, onColorSelect }) {
  const canvasRef = useRef(null);
  const [isDragging, setIsDragging] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const cx = size / 2, cy = size / 2, radius = size / 2 - 4;
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const dx = x - cx, dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist <= radius) {
          const hue = (Math.atan2(dy, dx) / (2 * Math.PI) + 1) % 1;
          const sat = dist / radius;
          const [r, g, b] = hsvToRgb(hue, sat, 1);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(x, y, 1, 1);
        }
      }
    }
  }, [size]);

  const pickColor = useCallback((e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
    const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
    const cx = size / 2, cy = size / 2, radius = size / 2 - 4;
    const dx = x - cx, dy = y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist <= radius) {
      const hue = (Math.atan2(dy, dx) / (2 * Math.PI) + 1) % 1;
      const sat = dist / radius;
      const [r, g, b] = hsvToRgb(hue, sat, 1);
      onColorSelect?.(r, g, b);
    }
  }, [size, onColorSelect]);

  return (
    <canvas
      ref={canvasRef} width={size} height={size}
      style={{ borderRadius: "50%", cursor: "crosshair", touchAction: "none" }}
      onMouseDown={(e) => { setIsDragging(true); pickColor(e); }}
      onMouseMove={(e) => isDragging && pickColor(e)}
      onMouseUp={() => setIsDragging(false)}
      onMouseLeave={() => setIsDragging(false)}
      onTouchStart={(e) => { e.preventDefault(); pickColor(e); }}
      onTouchMove={(e) => { e.preventDefault(); pickColor(e); }}
    />
  );
}

function Slider({ label, value, min, max, onChange, color, unit = "" }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 500 }}>{label}</span>
        <span style={{ fontSize: 12, color: "#e2e8f0", fontWeight: 600 }}>{value}{unit}</span>
      </div>
      <input
        type="range" min={min} max={max} value={value}
        onChange={(e) => onChange(Number(e.target.value))}
        style={{
          width: "100%", height: 6, appearance: "none", borderRadius: 3,
          background: `linear-gradient(to right, ${color || "#6366f1"} ${pct}%, #334155 ${pct}%)`,
          cursor: "pointer", outline: "none",
        }}
      />
    </div>
  );
}

function LightCard({ light, onControl, favorites, onFavoritesChange, nicknames, onNicknameChange }) {
  const [brightness, setBrightness] = useState(
    light.type === "hue" ? Math.round((light.state?.brightness || 0) / 254 * 100) : (light.state?.brightness ?? 50)
  );
  const [lightColor, setLightColor] = useState(() => getInitialColor(light));
  const [editing, setEditing] = useState(false);
  const [editValue, setEditValue] = useState("");

  // Sync state when light prop changes (e.g. after refresh)
  useEffect(() => {
    setBrightness(
      light.type === "hue" ? Math.round((light.state?.brightness || 0) / 254 * 100) : (light.state?.brightness ?? 50)
    );
    const c = getInitialColor(light);
    if (c) setLightColor(c);
  }, [light.state?.on, light.state?.brightness, light.state?.hue, light.state?.saturation, light.state?.xy, light.state?.color?.r, light.state?.color?.g, light.state?.color?.b]);
  const isOn = light.state?.on ?? false;
  const isReachable = light.state?.reachable ?? true;
  const hasColor = light.capabilities?.has_color;

  const deviceKey = light.type === "hue" ? `hue:${light.id}` : `govee:${light.ip}`;
  const nickname = nicknames?.[deviceKey] || "";
  const friendlyName = light.type === "hue"
    ? (light.product_name || light.name || light.model || `Light ${light.id}`)
    : (GOVEE_SKU_NAMES[light.sku] || light.name || light.sku || "Govee Device");
  const modelLine = light.type === "hue"
    ? `Hue · ${light.product_name || light.model}`
    : `Govee · ${light.sku}`;

  const startEdit = () => {
    setEditValue(nickname);
    setEditing(true);
  };

  const saveEdit = () => {
    const val = editValue.trim();
    if (onNicknameChange) {
      onNicknameChange(deviceKey, val);
    }
    setEditing(false);
  };

  const clearNickname = () => {
    if (onNicknameChange) {
      onNicknameChange(deviceKey, "");
    }
  };

  return (
    <div style={{
      background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)",
      borderRadius: 16, padding: 20, border: "1px solid #334155",
      opacity: isReachable ? 1 : 0.5, transition: "all 0.2s ease",
    }}>
      {/* Header: name + toggle */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
        <div style={{ flex: 1, minWidth: 0, marginRight: 12 }}>
          {/* Nickname row */}
          {editing ? (

          <div style={{ fontSize: nickname ? 12 : 14, fontWeight: nickname ? 500 : 600, color: nickname ? "#94a3b8" : "#f1f5f9" }}>{friendlyName}</div>

          {light.ip && (
            <div style={{ fontSize: 10, color: "#475569", marginTop: 1 }}>{light.ip}</div>
          )}
          {/* MAC address */}
          {light.mac && (
            <div style={{ fontSize: 10, color: "#475569", marginTop: 1 }}>{light.mac}</div>
          )}
        </div>
        <button
          onClick={() => onControl(light, { on: !isOn })}
          style={{
            width: 48, height: 28, borderRadius: 14, border: "none",
            background: isOn ? "#6366f1" : "#334155",
            cursor: "pointer", position: "relative", transition: "background 0.2s",
            flexShrink: 0, marginTop: 2,
          }}
        >
          <div style={{
            width: 22, height: 22, borderRadius: "50%", background: "#fff",
            position: "absolute", top: 3,
            left: isOn ? 23 : 3, transition: "left 0.2s ease",
          }} />
        </button>
      </div>
      {isOn && (
        <>
          <Slider
            label="Brightness" value={brightness} min={0} max={100}
            onChange={(v) => {
              setBrightness(v);
              if (light.type === "hue") {
                onControl(light, { brightness: Math.round(v * 254 / 100) });
              } else {
                onControl(light, { brightness: v });
              }
            }}
            color="#fbbf24" unit="%"
          />
          {hasColor && (
            <ColorPicker
              size={130}
              compact={true}
              currentColor={lightColor}
              onColorSelect={(r, g, b) => {
                setLightColor({ r, g, b });
                onControl(light, { r, g, b });
              }}
              favorites={favorites}
              onFavoritesChange={onFavoritesChange}
            />
          )}
        </>
      )}
    </div>
  );
}

// ─── Thunder Sound Synth ─────────────────────────────────────────────────────

let _thunderCtx = null;

function playThunder() {
  // Reuse or create AudioContext (browsers limit the number of contexts).
  if (!_thunderCtx || _thunderCtx.state === "closed") {
    _thunderCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  const ctx = _thunderCtx;
  if (ctx.state === "suspended") ctx.resume();

  const duration = 1.5 + Math.random() * 2.5;
  const sampleRate = ctx.sampleRate;
  const numSamples = Math.floor(duration * sampleRate);
  const buffer = ctx.createBuffer(1, numSamples, sampleRate);
  const data = buffer.getChannelData(0);

  // Brown noise with multi-layer envelope: sharp crack + long rumble.
  let last = 0;
  for (let i = 0; i < numSamples; i++) {
    const t = i / sampleRate;
    const crack = Math.exp(-t * 10) * 0.7;
    const rumble = Math.exp(-t * 1.0) * (1.0 + 0.4 * Math.sin(t * 2.3));
    const envelope = crack + rumble;
    const white = Math.random() * 2 - 1;
    last = (last + 0.02 * white) / 1.02;
    data[i] = last * envelope * 35;
  }

  const source = ctx.createBufferSource();
  source.buffer = buffer;

  const lowpass = ctx.createBiquadFilter();
  lowpass.type = "lowpass";
  lowpass.frequency.value = 120 + Math.random() * 100;

  const gain = ctx.createGain();
  gain.gain.value = 0.8;

  source.connect(lowpass);
  lowpass.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

  fast:     { label: "Fast",     min_gap_ms: 500,   max_gap_ms: 2000,  flash_duration_min_ms: 40, flash_duration_max_ms: 120, burst_count_min: 2, burst_count_max: 5, inter_burst_gap_ms: 40 },

};

function getActivePreset(settings) {
  if (!settings) return null;
  for (const [key, preset] of Object.entries(LIGHTNING_PRESETS)) {
    const { label, ...timing } = preset;
    if (Object.entries(timing).every(([k, v]) => settings[k] === v)) return key;
  }
  return null;
}

  const [settings, setSettings] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    api(`/scenes/lightning/settings/${encodeURIComponent(roomName)}`)
      .then(data => { setSettings(data); setLoading(false); })
      .catch(() => {
        setSettings({
          color_temp_kelvin: 6500, use_color_temp: true,
          color_r: 220, color_g: 240, color_b: 255,
          background_brightness: 10, background_color_temp_k: 2700,
          govee_flash: false, thunder_enabled: false, thunder_immediate: false, thunder_funny: false,

          burst_count_min: 1, burst_count_max: 2, inter_burst_gap_ms: 80,

        setLoading(false);

  }, [roomName]);

  // SSE connection for thunder sound sync.
  useEffect(() => {
    if (!isActive || !settings?.thunder_enabled) return;
    const immediate = settings.thunder_immediate;
    const funny = settings.thunder_funny;
    const soundFn = funny ? playFart : playThunder;
    const es = new EventSource(`/api/scenes/lightning/events/${encodeURIComponent(roomName)}`);
    es.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === "flash") {
        if (immediate) {
          soundFn();
        } else {
          const delay = 500 + Math.random() * 5500;
          setTimeout(() => soundFn(), delay);
        }
      }
    };
    return () => es.close();
  }, [isActive, settings?.thunder_enabled, settings?.thunder_immediate, settings?.thunder_funny, roomName]);

  const updateSetting = (key, value) => {
    setSettings(prev => ({ ...prev, [key]: value }));
  };

  const saveSettings = async () => {
    setSaving(true);

                    <button
                      onClick={async () => {
                        const newMode = !isSegmentMode;
                        try {
                          await api("/govee/segment-mode", {
                            method: "POST",
                            body: JSON.stringify({ room_name: roomName, ip: d.ip, enabled: newMode }),
                          });
                          if (newMode && info?.count) {
                            await api("/govee/segment-count", {
                              method: "POST",
                              body: JSON.stringify({ ip: d.ip, count: info.count }),
                            });
                          }
                          // Reload segment info in parent via event
                          window.dispatchEvent(new Event("lightemup-reload-segments"));
                        } catch (e) {
                          console.error("Failed to toggle segment mode:", e);
                        }
                      }}
                      style={{
                        width: 48, height: 28, borderRadius: 14, border: "none",
                        background: isSegmentMode ? "#6366f1" : "#334155",
                        cursor: "pointer", position: "relative", transition: "background 0.2s",
                      }}
                    >
                      <div style={{
                        width: 22, height: 22, borderRadius: "50%", background: "#fff",
                        position: "absolute", top: 3,
                        left: isSegmentMode ? 23 : 3, transition: "left 0.2s ease",
                      }} />
                    </button>
                  </div>
                );
              })}
              <div style={{ fontSize: 10, color: "#475569", marginTop: 4 }}>
                When enabled, each panel/segment flashes independently.
              </div>
            </div>
          )}

          {/* Save */}
          <button
            onClick={saveSettings} disabled={saving}
            style={{
              padding: "10px 24px", borderRadius: 10, border: "none",
              background: saving ? "#475569" : "#334155",
              color: "#f1f5f9", fontSize: 13, fontWeight: 600,
              cursor: saving ? "wait" : "pointer", alignSelf: "flex-start",
            }}
          >{saving ? "Saving..." : "Save Settings"}</button>
        </div>
      )}
    </div>
  );
}

function RoomSection({ name, hueLights, goveeDevices, onControlHue, onControlGovee, onControlRoom, favorites, onFavoritesChange, nicknames, onNicknameChange, lightningActive, onLightningStart, onLightningStop, segmentInfo }) {
  const [collapsed, setCollapsed] = useState(false);
  const [showRoomControls, setShowRoomControls] = useState(false);
  const [showLightning, setShowLightning] = useState(false);
  const [roomBrightness, setRoomBrightness] = useState(75);
  const [roomColor, setRoomColor] = useState(null);

  const allLights = [
    ...hueLights.map(l => ({ ...l, _controlFn: onControlHue })),
    ...goveeDevices.map(d => ({ ...d, _controlFn: onControlGovee })),
  ];
  const anyOn = allLights.some(l => l.state?.on);
  const anyColor = allLights.some(l => l.capabilities?.has_color);

  const applyRoomBrightness = (val) => {
    setRoomBrightness(val);
    onControlRoom(name, { on: true, brightness: val });
  };

  const applyRoomColor = (r, g, b) => {
    setRoomColor({ r, g, b });
    onControlRoom(name, { on: true, r, g, b });
  };

  return (
    <div style={{ marginBottom: 32 }}>

      }}>
        <div
          onClick={() => setCollapsed(!collapsed)}
          style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", userSelect: "none" }}
        >
          <span style={{ fontSize: 14, color: "#64748b", transition: "transform 0.2s", transform: collapsed ? "rotate(-90deg)" : "rotate(0deg)", display: "inline-block" }}>&#x25BC;</span>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: "#f8fafc", margin: 0 }}>{name}</h2>
          <span style={{ fontSize: 12, color: "#64748b" }}>{allLights.length} lights</span>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button
            onClick={() => { setShowLightning(!showLightning); if (!showLightning) setShowRoomControls(false); }}
            style={{
              padding: "6px 14px", borderRadius: 8, border: "1px solid #334155",
              background: showLightning || lightningActive ? "rgba(251,191,36,0.15)" : "transparent",
              color: showLightning || lightningActive ? "#fbbf24" : "#94a3b8",
              fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.2s",
            }}
          >
            &#x26A1; {lightningActive ? "Storm" : "Lightning"}
          </button>
          <button
            onClick={() => { setShowRoomControls(!showRoomControls); if (!showRoomControls) setShowLightning(false); }}
            style={{
              padding: "6px 14px", borderRadius: 8, border: "1px solid #334155",
              background: showRoomControls ? "rgba(99,102,241,0.15)" : "transparent",
              color: showRoomControls ? "#a5b4fc" : "#94a3b8",
              fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.2s",
            }}
          >
            Room Controls
          </button>
          <button
            onClick={() => onControlRoom(name, { on: !anyOn })}
            style={{
              padding: "6px 16px", borderRadius: 8, border: "none",
              background: anyOn ? "#334155" : "#6366f1",
              color: "#f1f5f9", fontSize: 12, fontWeight: 600,
              cursor: "pointer", transition: "all 0.2s",
            }}
          >
            {anyOn ? "All Off" : "All On"}
          </button>
        </div>
      </div>

      {!collapsed && (<React.Fragment>
        {/* Lightning panel */}
        {showLightning && (
          <LightningPanel
            roomName={name}
            isActive={lightningActive}
            onStart={onLightningStart}
            onStop={onLightningStop}
            goveeDevices={goveeDevices}
            segmentInfo={segmentInfo}
          />
        )}

        {/* Room-level controls panel */}
        {showRoomControls && (
          <div style={{
            background: "linear-gradient(135deg, #1e293b 0%, #172033 100%)",
            borderRadius: 16, padding: 20, marginBottom: 16,
            border: "1px solid #334155",

            <div style={{
              fontSize: 12, fontWeight: 600, color: "#a5b4fc", marginBottom: 14,
              textTransform: "uppercase", letterSpacing: 0.8,

            <Slider
              label="Room Brightness" value={roomBrightness} min={0} max={100}

            {anyColor && (
              <div style={{ marginTop: 4 }}>
                <ColorPicker
                  size={160}

                  onFavoritesChange={onFavoritesChange}

            )}

        )}

        {/* Individual light cards */}
        <div style={{
          display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 12,
        }}>
          {allLights.map((light, i) => (
            <LightCard
              key={`${light.type}-${light.id || light.ip}-${i}`}
              light={light}
              onControl={(l, cmd) => l._controlFn(l, cmd)}

              onFavoritesChange={onFavoritesChange}
              nicknames={nicknames}

function DevicePickerModal({ title, devices, onSelect, onClose, nicknames }) {
  if (devices.length === 0) return null;
  const [selected, setSelected] = useState(new Set());

  const toggle = (d) => {
    const key = d.type === "hue" ? `hue:${d.id}` : `govee:${d.ip}`;
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };

  const getKey = (d) => d.type === "hue" ? `hue:${d.id}` : `govee:${d.ip}`;

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000,
      background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: 16,
    }} onClick={onClose}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: "#1e293b", borderRadius: 20, border: "1px solid #334155",
          width: "100%", maxWidth: 420, maxHeight: "80vh",
          display: "flex", flexDirection: "column",
        }}
      >
        <div style={{ padding: "20px 20px 12px", borderBottom: "1px solid #0f172a" }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: "#f1f5f9", margin: 0 }}>{title}</h3>
          <p style={{ fontSize: 12, color: "#64748b", margin: "4px 0 0" }}>
            Tap to select, then confirm.
          </p>
        </div>
        <div style={{ flex: 1, overflow: "auto", padding: "12px 20px" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {devices.map((d, i) => {
              const key = getKey(d);
              const isSelected = selected.has(key);
              const isHue = d.type === "hue";
              const { nickname, friendlyName } = getDeviceDisplayName(d, nicknames);
              const subtitle = isHue ? (d.product_name || d.model || "Hue") : (d.sku || d.ip);
              return (
                <button
                  key={`pick-${key}-${i}`}
                  onClick={() => toggle(d)}
                  style={{
                    display: "flex", alignItems: "center", gap: 10,
                    padding: "12px 14px", borderRadius: 12, border: "none",
                    background: isSelected ? "rgba(99,102,241,0.15)" : "#0f172a",
                    outline: isSelected ? "2px solid #6366f1" : "1px solid #334155",
                    cursor: "pointer", textAlign: "left", width: "100%",
                    transition: "all 0.15s ease",
                  }}
                >
                  <div style={{
                    width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                    border: isSelected ? "none" : "2px solid #475569",
                    background: isSelected ? "#6366f1" : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 14, color: "#fff",
                  }}>
                    {isSelected ? "✓" : ""}
                  </div>
                  <div style={{
                    width: 8, height: 8, borderRadius: "50%", flexShrink: 0,
                    background: isHue ? "#fbbf24" : "#34d399",
                  }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    {nickname && (
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>{nickname}</div>
                    )}
                    <div style={{
                      fontSize: nickname ? 11 : 13, fontWeight: nickname ? 500 : 600,
                      color: nickname ? "#94a3b8" : "#e2e8f0",
                    }}>{friendlyName}</div>
                    <div style={{ fontSize: 10, color: "#64748b", marginTop: 1 }}>{subtitle}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
        <div style={{
          padding: "12px 20px 20px", borderTop: "1px solid #0f172a",
          display: "flex", gap: 8, justifyContent: "flex-end",
        }}>
          <button onClick={onClose} style={{
            padding: "10px 20px", borderRadius: 10, border: "1px solid #334155",
            background: "transparent", color: "#94a3b8", fontSize: 13,
            fontWeight: 600, cursor: "pointer",
          }}>Cancel</button>
          <button
            disabled={selected.size === 0}
            onClick={() => {
              const picked = devices.filter(d => selected.has(getKey(d)));
              onSelect(picked);
              onClose();
            }}
            style={{
              padding: "10px 20px", borderRadius: 10, border: "none",
              background: selected.size > 0 ? "#6366f1" : "#334155",
              color: selected.size > 0 ? "#fff" : "#64748b",
              fontSize: 13, fontWeight: 600,
              cursor: selected.size > 0 ? "pointer" : "default",
            }}
          >Add {selected.size > 0 ? `(${selected.size})` : ""}</button>
        </div>
      </div>
    </div>
  );

function RoomAssignment({ hueLights, goveeDevices, rooms, onRoomsChange, nicknames }) {
  const [newRoomName, setNewRoomName] = useState("");
  const [saving, setSaving] = useState(false);
  const [saveStatus, setSaveStatus] = useState(null);

  const getDevicesForRoom = (roomName) => {
    const room = rooms[roomName] || {};
    return [
      ...hueLights.filter(l => (room.hue_light_ids || []).includes(l.id)),
      ...goveeDevices.filter(d => (room.govee_devices || []).includes(d.ip)),
    ];
  };

  const getUnassigned = () => {
    const assignedHueIds = new Set();
    const assignedGoveeIps = new Set();
    Object.values(rooms).forEach(r => {
      (r.hue_light_ids || []).forEach(id => assignedHueIds.add(id));
      (r.govee_devices || []).forEach(ip => assignedGoveeIps.add(ip));
    });
    return [
      ...hueLights.filter(l => !assignedHueIds.has(l.id)),
      ...goveeDevices.filter(d => !assignedGoveeIps.has(d.ip)),
    ];
  };

  const moveDevice = (device, fromRoom, toRoom) => {
    if (fromRoom === toRoom) return;
    const updated = JSON.parse(JSON.stringify(rooms));

    // Remove from source
    if (updated[fromRoom]) {
      if (device.type === "hue") {
        updated[fromRoom].hue_light_ids = (updated[fromRoom].hue_light_ids || []).filter(id => id !== device.id);
      } else {
        updated[fromRoom].govee_devices = (updated[fromRoom].govee_devices || []).filter(ip => ip !== device.ip);
      }
    }

    // Add to target
    if (!updated[toRoom]) updated[toRoom] = { hue_light_ids: [], govee_devices: [] };
    if (device.type === "hue") {
      if (!(updated[toRoom].hue_light_ids || []).includes(device.id)) {
        updated[toRoom].hue_light_ids = [...(updated[toRoom].hue_light_ids || []), device.id];
      }
    } else {
      if (!(updated[toRoom].govee_devices || []).includes(device.ip)) {
        updated[toRoom].govee_devices = [...(updated[toRoom].govee_devices || []), device.ip];
      }
    }

    onRoomsChange(updated);
  };

  const removeDevice = (device, roomName) => {
    const updated = JSON.parse(JSON.stringify(rooms));
    if (device.type === "hue") {
      updated[roomName].hue_light_ids = (updated[roomName].hue_light_ids || []).filter(id => id !== device.id);
    } else {
      updated[roomName].govee_devices = (updated[roomName].govee_devices || []).filter(ip => ip !== device.ip);
    }
    onRoomsChange(updated);
  };

  const addDevicesToRoom = (roomName, devices) => {
    const updated = JSON.parse(JSON.stringify(rooms));
    if (!updated[roomName]) updated[roomName] = { hue_light_ids: [], govee_devices: [] };
    for (const d of devices) {
      if (d.type === "hue") {
        if (!(updated[roomName].hue_light_ids || []).includes(d.id)) {
          updated[roomName].hue_light_ids = [...(updated[roomName].hue_light_ids || []), d.id];
        }
      } else {
        if (!(updated[roomName].govee_devices || []).includes(d.ip)) {
          updated[roomName].govee_devices = [...(updated[roomName].govee_devices || []), d.ip];
        }
      }
    }
    onRoomsChange(updated);
  };

  const addRoom = () => {
    const name = newRoomName.trim();
    if (!name || rooms[name]) return;
    onRoomsChange({ ...rooms, [name]: { hue_light_ids: [], govee_devices: [] } });
    setNewRoomName("");
  };

  const deleteRoom = (name) => {
    const updated = { ...rooms };
    delete updated[name];
    onRoomsChange(updated);
  };

  const saveAll = async () => {
    setSaving(true);
    setSaveStatus(null);
    try {
      for (const [name, room] of Object.entries(rooms)) {
        await api("/rooms", {
          method: "POST",
          body: JSON.stringify({
            name,
            hue_light_ids: room.hue_light_ids || [],
            govee_devices: room.govee_devices || [],
          }),
        });
      }
      setSaveStatus("success");
      setTimeout(() => setSaveStatus(null), 3000);
    } catch {
      setSaveStatus("error");
    }
    setSaving(false);
  };

  const unassigned = getUnassigned();
  const allRoomNames = Object.keys(rooms);
  const defaultRooms = ["Bedroom", "Living Room", "Outside"];

  return (
    <div>
      <div style={{
        display: "flex", flexWrap: "wrap", justifyContent: "space-between",
        alignItems: "center", gap: 12, marginBottom: 20,
      }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: "#f8fafc", margin: 0 }}>Room Assignment</h2>
          <p style={{ fontSize: 13, color: "#64748b", margin: "4px 0 0" }}>
            Add devices to rooms, reassign with the dropdown, or remove them.
          </p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {saveStatus === "success" && <span style={{ fontSize: 12, color: "#4ade80" }}>✓ Saved</span>}
          {saveStatus === "error" && <span style={{ fontSize: 12, color: "#f87171" }}>Save failed</span>}
          <button
            onClick={saveAll} disabled={saving}
            style={{
              padding: "8px 24px", borderRadius: 10, border: "none",
              background: saving ? "#475569" : "#6366f1",
              color: "#fff", fontSize: 13, fontWeight: 600,
              cursor: saving ? "wait" : "pointer",
            }}
          >{saving ? "Saving..." : "Save Rooms"}</button>
        </div>
      </div>

      {/* Legend */}
      <div style={{
        display: "flex", gap: 16, marginBottom: 20, padding: "10px 16px",
        background: "#0f172a", borderRadius: 10, border: "1px solid #1e293b",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#fbbf24" }} /> Hue / Zigbee
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#34d399" }} /> Govee
        </div>
        {unassigned.length > 0 && (
          <div style={{ fontSize: 12, color: "#fbbf24", marginLeft: "auto" }}>
            {unassigned.length} unassigned
          </div>
        )}
      </div>

      {/* Room cards */}
      {allRoomNames.map(roomName => (
        <RoomCard
          key={roomName}
          roomName={roomName}
          devices={getDevicesForRoom(roomName)}
          allRoomNames={allRoomNames}
          unassigned={unassigned}
          onMoveDevice={moveDevice}
          onRemoveDevice={removeDevice}
          onAddDevices={addDevicesToRoom}
          onDeleteRoom={deleteRoom}
          isDefault={defaultRooms.includes(roomName)}
          nicknames={nicknames}
        />
      ))}

      {/* Unassigned section */}
      {unassigned.length > 0 && (
        <div style={{
          background: "#1e293b", borderRadius: 16, padding: 20,
          border: "1px dashed #475569", marginBottom: 16,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "#fbbf24", margin: 0 }}>Unassigned</h3>
            <span style={{
              fontSize: 11, color: "#64748b", background: "#0f172a",
              padding: "2px 8px", borderRadius: 10,
            }}>{unassigned.length}</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {unassigned.map((d, i) => {
              const isHue = d.type === "hue";
              const { nickname, friendlyName } = getDeviceDisplayName(d, nicknames);
              const subtitle = isHue ? (d.product_name || d.model || "Hue") : (d.sku || d.ip);
              return (
                <div key={`unassigned-${d.type}-${d.id || d.ip}-${i}`} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "10px 14px", borderRadius: 12,
                  background: "#0f172a", border: "1px solid #334155",
                }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: "50%", flexShrink: 0,
                    background: isHue ? "#fbbf24" : "#34d399",
                  }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    {nickname && (
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>{nickname}</div>
                    )}
                    <div style={{
                      fontSize: nickname ? 11 : 13, fontWeight: nickname ? 500 : 600,
                      color: nickname ? "#94a3b8" : "#e2e8f0",
                    }}>{friendlyName}</div>
                    <div style={{ fontSize: 10, color: "#64748b", marginTop: 1 }}>{subtitle}</div>
                  </div>
                  <select
                    value=""
                    onChange={(e) => {
                      if (e.target.value) addDevicesToRoom(e.target.value, [d]);
                    }}
                    style={{
                      padding: "5px 8px", borderRadius: 8, border: "1px solid #334155",
                      background: "#1e293b", color: "#a5b4fc", fontSize: 12,
                      cursor: "pointer", outline: "none",
                    }}
                  >
                    <option value="">Assign to...</option>
                    {allRoomNames.map(rn => (
                      <option key={rn} value={rn}>{rn}</option>
                    ))}
                  </select>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Add room */}
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <input
          type="text" value={newRoomName}
          onChange={(e) => setNewRoomName(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && addRoom()}
          placeholder="New room name..."
          style={{
            flex: 1, padding: "10px 14px", borderRadius: 10,
            border: "1px solid #334155", background: "#0f172a",
            color: "#f1f5f9", fontSize: 13, outline: "none",
          }}
        />
        <button
          onClick={addRoom} disabled={!newRoomName.trim()}
          style={{
            padding: "10px 20px", borderRadius: 10, border: "none",
            background: newRoomName.trim() ? "#334155" : "#1e293b",
            color: newRoomName.trim() ? "#f1f5f9" : "#475569",
            fontSize: 13, fontWeight: 600, cursor: newRoomName.trim() ? "pointer" : "default",
          }}
        >+ Add Room</button>
      </div>
    </div>
  );
}

// ─── Setup Wizard ───────────────────────────────────────────────────────────

function SetupWizard({ onComplete }) {
  const [bridges, setBridges] = useState([]);
  const [selectedBridge, setSelectedBridge] = useState(null);
  const [pairing, setPairing] = useState(false);
  const [pairError, setPairError] = useState(null);
  const [loading, setLoading] = useState(false);

  const discoverBridges = async () => {
    setLoading(true);
    try {
      const data = await api("/discover/hue");
      setBridges(data.bridges || []);
      if (data.bridges?.length) setSelectedBridge(data.bridges[0]);
    } catch {}
    setLoading(false);
  };

  const pairBridge = async () => {
    if (!selectedBridge) return;
    setPairing(true);
    setPairError(null);
    try {
      await api("/hue/pair", {
        method: "POST",
        body: JSON.stringify({ ip: selectedBridge.ip }),
      });
      onComplete();
    } catch (e) {
      setPairError(e.message);
    }
    setPairing(false);
  };

  useEffect(() => { discoverBridges(); }, []);

  return (
    <div style={{
      maxWidth: 480, margin: "80px auto", padding: 32,
      background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)",
      borderRadius: 24, border: "1px solid #334155",
    }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>🔆</div>
        <h1 style={{ fontSize: 28, fontWeight: 800, color: "#f8fafc", margin: 0 }}>LightEmUp</h1>
        <p style={{ color: "#94a3b8", marginTop: 8 }}>Let's set up your Hue Bridge</p>
      </div>

      {loading ? (
        <div style={{ textAlign: "center", color: "#94a3b8", padding: 24 }}>Scanning network for Hue Bridges...</div>
      ) : bridges.length === 0 ? (
        <div style={{ textAlign: "center" }}>
          <p style={{ color: "#f87171" }}>No Hue Bridge found on the network.</p>
          <button onClick={discoverBridges} style={{
            padding: "10px 24px", borderRadius: 10, border: "none",
            background: "#6366f1", color: "#fff", fontSize: 14, cursor: "pointer",
          }}>Retry</button>
        </div>
      ) : (
        <div>
          <div style={{
            padding: 16, borderRadius: 12, background: "#0f172a",
            border: "1px solid #334155", marginBottom: 20,
          }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#f1f5f9" }}>Found: {selectedBridge?.ip}</div>
            <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>ID: {selectedBridge?.id}</div>
          </div>
          <div style={{
            padding: 16, borderRadius: 12, background: "rgba(99,102,241,0.1)",
            border: "1px solid rgba(99,102,241,0.3)", marginBottom: 20, textAlign: "center",
          }}>
            <p style={{ color: "#a5b4fc", fontSize: 14, margin: 0 }}>
              Press the <strong>button on your Hue Bridge</strong>, then click Pair below.
            </p>
          </div>
          {pairError && (
            <div style={{
              padding: 12, borderRadius: 10, background: "rgba(248,113,113,0.1)",
              border: "1px solid rgba(248,113,113,0.3)", marginBottom: 16,
              color: "#f87171", fontSize: 13, textAlign: "center",
            }}>{pairError}</div>
          )}
          <button onClick={pairBridge} disabled={pairing} style={{
            width: "100%", padding: "12px 24px", borderRadius: 12, border: "none",
            background: pairing ? "#475569" : "#6366f1",
            color: "#fff", fontSize: 15, fontWeight: 600, cursor: pairing ? "wait" : "pointer",
          }}>{pairing ? "Pairing..." : "Pair with Bridge"}</button>
        </div>
      )}
    </div>
  );
}

// ─── Main App ───────────────────────────────────────────────────────────────

function App() {
  const [config, setConfig] = useState(null);
  const [hueLights, setHueLights] = useState([]);
  const [hueGroups, setHueGroups] = useState([]);
  const [goveeDevices, setGoveeDevices] = useState([]);
  const [rooms, setRooms] = useState({});
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [activeTab, setActiveTab] = useState("rooms");
  const [showHueSetup, setShowHueSetup] = useState(false);
  const [favoriteColors, setFavoriteColors] = useState(() => loadFavoriteColors());
  const [nicknames, setNicknames] = useState({});
  const [refreshing, setRefreshing] = useState(false);
  const [lightningActiveRooms, setLightningActiveRooms] = useState([]);
  const [segmentInfo, setSegmentInfo] = useState({ sku_table: {}, configured_counts: {}, segment_mode: {} });

  const updateFavorites = (newFavs) => {
    setFavoriteColors(newFavs);
    saveFavoriteColors(newFavs);
  };

  const updateNickname = async (deviceKey, nickname) => {
    setNicknames(prev => ({ ...prev, [deviceKey]: nickname }));
    try {
      await api("/nicknames", {
        method: "POST",
        body: JSON.stringify({ device_key: deviceKey, nickname }),
      });
    } catch (e) {
      console.error("Failed to save nickname:", e);
    }
  };

  const loadAll = useCallback(async () => {
    try {
      const cfg = await api("/config");
      setConfig(cfg);
      setRooms(cfg.rooms || {});
      setNicknames(cfg.nicknames || {});

      const promises = [
        api("/discover/govee").catch(() => ({ devices: [] })),
        api("/scenes/lightning/status").catch(() => ({ active: [] })),
        api("/govee/segment-info").catch(() => ({ sku_table: {}, configured_counts: {}, segment_mode: {} })),
      ];

      if (cfg.hue_paired) {
        promises.push(
          api("/hue/lights").catch(() => ({ lights: [] })),
          api("/hue/groups").catch(() => ({ groups: [] })),
        );
      }

      const results = await Promise.all(promises);
      setGoveeDevices(results[0].devices || []);
      setLightningActiveRooms(results[1].active || []);
      setSegmentInfo(results[2]);

      if (cfg.hue_paired) {
        setHueLights(results[3]?.lights || []);
        setHueGroups(results[4]?.groups || []);
      }
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Reload segment info when toggled from LightningPanel
  useEffect(() => {
    const handler = () => {
      api("/govee/segment-info")
        .then(data => setSegmentInfo(data))
        .catch(() => {});
    };
    window.addEventListener("lightemup-reload-segments", handler);
    return () => window.removeEventListener("lightemup-reload-segments", handler);
  }, []);

  const startLightning = async (roomName) => {
    try {
      await api("/scenes/lightning/start", {
        method: "POST",
        body: JSON.stringify({ room_name: roomName }),
      });
      setLightningActiveRooms(prev => [...prev, roomName]);
    } catch (e) {
      console.error("Failed to start lightning:", e);
    }
  };

  const stopLightning = async (roomName) => {
    try {
      await api("/scenes/lightning/stop", {
        method: "POST",
        body: JSON.stringify({ room_name: roomName }),
      });
      setLightningActiveRooms(prev => prev.filter(r => r !== roomName));
    } catch (e) {
      console.error("Failed to stop lightning:", e);
    }
  };

  const refreshState = async () => {
    setRefreshing(true);
    try {
      await loadAll();
    } finally {
      setRefreshing(false);
    }
  };

  const controlHueLight = async (light, cmd) => {
    api("/hue/light", {
      method: "POST",
      body: JSON.stringify({ light_id: light.id, ...cmd }),
    }).catch(e => console.error("Hue control error:", e));
    setHueLights(prev => prev.map(l => {
      if (l.id === light.id) {
        return { ...l, state: { ...l.state, ...(cmd.on !== undefined ? { on: cmd.on } : {}), ...(cmd.brightness !== undefined ? { brightness: cmd.brightness } : {}) } };
      }
      return l;
    }));
  };

  const controlGoveeDevice = async (device, cmd) => {
    api("/govee/control", {
      method: "POST",
      body: JSON.stringify({ ip: device.ip, ...cmd }),
    }).catch(e => console.error("Govee control error:", e));
    setGoveeDevices(prev => prev.map(d => {
      if (d.ip === device.ip) {
        const stateUpdate = {};
        if (cmd.on !== undefined) stateUpdate.on = cmd.on;
        if (cmd.brightness !== undefined) stateUpdate.brightness = cmd.brightness;
        if (cmd.r !== undefined) stateUpdate.color = { r: cmd.r, g: cmd.g, b: cmd.b };
        return { ...d, state: { ...d.state, ...stateUpdate } };
      }
      return d;
    }));
  };

  const controlRoom = async (roomName, cmd) => {
    // cmd can be { on: bool } or { on, brightness, r, g, b }
    api("/rooms/control", {
      method: "POST",
      body: JSON.stringify({ room_name: roomName, ...cmd }),
    }).catch(e => console.error("Room control error:", e));

    // Optimistic update for all devices in this room
    const room = rooms[roomName] || {};
    const hueIds = new Set(room.hue_light_ids || []);
    const goveeIps = new Set(room.govee_devices || []);

    if (hueIds.size > 0) {
      setHueLights(prev => prev.map(l => {
        if (!hueIds.has(l.id)) return l;
        const stateUpdate = {};
        if (cmd.on !== undefined) stateUpdate.on = cmd.on;
        if (cmd.brightness !== undefined) stateUpdate.brightness = Math.round(cmd.brightness * 254 / 100);
        return { ...l, state: { ...l.state, ...stateUpdate } };
      }));
    }

    if (goveeIps.size > 0) {
      setGoveeDevices(prev => prev.map(d => {
        if (!goveeIps.has(d.ip)) return d;
        const stateUpdate = {};
        if (cmd.on !== undefined) stateUpdate.on = cmd.on;
        if (cmd.brightness !== undefined) stateUpdate.brightness = cmd.brightness;
        if (cmd.r !== undefined) stateUpdate.color = { r: cmd.r, g: cmd.g, b: cmd.b };
        return { ...d, state: { ...d.state, ...stateUpdate } };
      }));
    }
  };

  if (loading) {
    return (
      <div style={{
        minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
        background: "#0a0f1e", color: "#94a3b8", fontFamily: "'Geist', -apple-system, sans-serif",
      }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔆</div>
          <div>Loading LightEmUp...</div>
        </div>
      </div>
    );
  }

  const getRoomLights = (roomName) => {
    const room = rooms[roomName] || {};
    return {
      hue: hueLights.filter(l => (room.hue_light_ids || []).includes(l.id)),
      govee: goveeDevices.filter(d => (room.govee_devices || []).includes(d.ip)),
    };
  };

  const unassignedHue = hueLights.filter(l => !Object.values(rooms).some(r => (r.hue_light_ids || []).includes(l.id)));
  const unassignedGovee = goveeDevices.filter(d => !Object.values(rooms).some(r => (r.govee_devices || []).includes(d.ip)));

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(180deg, #0a0f1e 0%, #0f172a 50%, #0a0f1e 100%)",
      fontFamily: "'Geist', -apple-system, sans-serif", color: "#f8fafc",
    }}>
      <header style={{
        padding: "20px 24px", borderBottom: "1px solid #1e293b",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        position: "sticky", top: 0, background: "rgba(10,15,30,0.95)",
        backdropFilter: "blur(12px)", zIndex: 100,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 28 }}>🔆</span>
          <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0, letterSpacing: -0.5 }}>LightEmUp</h1>
          <button
            onClick={refreshState}
            disabled={refreshing}
            title="Refresh all device states"
            style={{
              width: 32, height: 32, borderRadius: "50%", border: "1px solid #334155",
              background: refreshing ? "rgba(99,102,241,0.15)" : "transparent",
              color: refreshing ? "#a5b4fc" : "#64748b",
              cursor: refreshing ? "default" : "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 16, transition: "all 0.2s",
              animation: refreshing ? "spin 1s linear infinite" : "none",
            }}
          >
            ↻
          </button>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={() => setShowHueSetup(true)}
            style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              padding: "4px 12px", borderRadius: 20, border: "none", cursor: "pointer",
              background: config?.hue_paired ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.15)",
              color: config?.hue_paired ? "#4ade80" : "#f87171",
              fontSize: 12, fontWeight: 600, letterSpacing: 0.5,
            }}
            title={config?.hue_paired ? "Hue Bridge connected" : "Click to set up Hue Bridge"}
          >
            <span style={{
              width: 7, height: 7, borderRadius: "50%",
              background: config?.hue_paired ? "#4ade80" : "#f87171",
              boxShadow: config?.hue_paired ? "0 0 6px #4ade80" : "none",
            }} />
            Hue {config?.hue_paired ? "" : "(Setup)"}
          </button>
          <StatusBadge connected={goveeDevices.length > 0} label={`Govee (${goveeDevices.length})`} />
        </div>
      </header>

      <nav style={{ display: "flex", gap: 4, padding: "12px 24px", borderBottom: "1px solid #1e293b" }}>
        {["rooms", "all lights", "assign rooms", "settings"].map(tab => (
          <button
            key={tab} onClick={() => setActiveTab(tab)}
            style={{
              padding: "8px 20px", borderRadius: 8, border: "none",
              background: activeTab === tab ? "#6366f1" : "transparent",
              color: activeTab === tab ? "#fff" : "#64748b",
              fontSize: 13, fontWeight: 600, cursor: "pointer",
              textTransform: "capitalize", transition: "all 0.2s",
            }}
          >{tab}</button>
        ))}
      </nav>

      <main style={{ padding: 24, maxWidth: 1200, margin: "0 auto" }}>
        {error && (
          <div style={{
            padding: 16, borderRadius: 12,
            background: "rgba(248,113,113,0.1)", border: "1px solid rgba(248,113,113,0.3)",
            color: "#f87171", marginBottom: 24,
          }}>{error}</div>
        )}

        {activeTab === "rooms" && (
          <>
            {Object.keys(rooms).map(roomName => {
              const { hue, govee } = getRoomLights(roomName);
              return (
                <RoomSection key={roomName} name={roomName}
                  hueLights={hue} goveeDevices={govee}
                  onControlHue={controlHueLight} onControlGovee={controlGoveeDevice}
                  onControlRoom={controlRoom}
                  favorites={favoriteColors} onFavoritesChange={updateFavorites}
                  nicknames={nicknames} onNicknameChange={updateNickname}
                  lightningActive={lightningActiveRooms.includes(roomName)}
                  onLightningStart={() => startLightning(roomName)}
                  onLightningStop={() => stopLightning(roomName)}
                  segmentInfo={segmentInfo}
                />
              );
            })}
            {(unassignedHue.length > 0 || unassignedGovee.length > 0) && (
              <RoomSection name="Unassigned"
                hueLights={unassignedHue} goveeDevices={unassignedGovee}
                onControlHue={controlHueLight} onControlGovee={controlGoveeDevice}
                onControlRoom={() => {}}
                favorites={favoriteColors} onFavoritesChange={updateFavorites}
                nicknames={nicknames} onNicknameChange={updateNickname}
              />
            )}
          </>
        )}

        {activeTab === "all lights" && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 12 }}>
            {hueLights.map(light => (
              <LightCard key={`hue-${light.id}`} light={light} onControl={controlHueLight}
                favorites={favoriteColors} onFavoritesChange={updateFavorites}
                nicknames={nicknames} onNicknameChange={updateNickname} />
            ))}
            {goveeDevices.map(device => (
              <LightCard key={`govee-${device.ip}`} light={device} onControl={controlGoveeDevice}
                favorites={favoriteColors} onFavoritesChange={updateFavorites}
                nicknames={nicknames} onNicknameChange={updateNickname} />
            ))}
          </div>
        )}

        {activeTab === "assign rooms" && (
          <RoomAssignment
            hueLights={hueLights} goveeDevices={goveeDevices}
            rooms={rooms} onRoomsChange={setRooms}
            nicknames={nicknames}
          />
        )}

        {activeTab === "settings" && (
          <div style={{ maxWidth: 600 }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 20 }}>Configuration</h2>
            <div style={{ background: "#1e293b", borderRadius: 16, padding: 20, border: "1px solid #334155", marginBottom: 16 }}>
              <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12, color: "#e2e8f0" }}>Hue Bridge</h3>
              <div style={{ fontSize: 13, color: "#94a3b8" }}>IP: {config?.hue_bridge_ip || "Not found"}</div>
              <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 4 }}>
                Status: {config?.hue_paired ? "✅ Paired" : "❌ Not paired"}
              </div>
            </div>
            <div style={{ background: "#1e293b", borderRadius: 16, padding: 20, border: "1px solid #334155", marginBottom: 16 }}>
              <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12, color: "#e2e8f0" }}>Govee Devices</h3>
              <div style={{ fontSize: 13, color: "#94a3b8" }}>Found: {goveeDevices.length} devices via LAN</div>
              <button
                onClick={async () => { const data = await api("/discover/govee"); setGoveeDevices(data.devices || []); }}
                style={{ marginTop: 12, padding: "8px 16px", borderRadius: 8, border: "none", background: "#334155", color: "#f1f5f9", fontSize: 13, cursor: "pointer" }}
              >Re-scan Govee Devices</button>
            </div>
            <div style={{ background: "#1e293b", borderRadius: 16, padding: 20, border: "1px solid #334155", marginBottom: 16 }}>
              <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12, color: "#e2e8f0" }}>About</h3>
              <div style={{ fontSize: 13, color: "#94a3b8" }}>LightEmUp v0.1.0</div>
              <div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>Hue (Zigbee) + Govee (LAN) unified controller</div>
            </div>
            <div style={{ background: "#1e293b", borderRadius: 16, padding: 20, border: "1px solid #334155" }}>
              <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12, color: "#e2e8f0" }}>Server</h3>
              <div style={{ display: "flex", gap: 12 }}>
                <button
                  onClick={async () => {
                    if (!confirm("Restart the LightEmUp server? The page will reconnect automatically.")) return;
                    try { await api("/server/restart", { method: "POST" }); } catch {}
                    // Poll until server is back up, then reload
                    const poll = setInterval(async () => {
                      try {
                        const r = await fetch(API + "/config");
                        if (r.ok) { clearInterval(poll); window.location.reload(); }
                      } catch {}
                    }, 1000);
                  }}
                  style={{
                    padding: "10px 20px", borderRadius: 10, border: "none",
                    background: "#334155", color: "#f1f5f9", fontSize: 13,
                    fontWeight: 600, cursor: "pointer",
                  }}
                >Restart Server</button>
                <button
                  onClick={async () => {
                    if (!confirm("Shut down the LightEmUp server? You will need to relaunch it manually.")) return;
                    try { await api("/server/shutdown", { method: "POST" }); } catch {}
                  }}
                  style={{
                    padding: "10px 20px", borderRadius: 10, border: "1px solid #dc2626",
                    background: "transparent", color: "#f87171", fontSize: 13,
                    fontWeight: 600, cursor: "pointer",
                  }}
                >Stop Server</button>
              </div>
            </div>
          </div>
        )}
      {/* Hue Setup Modal */}
      {showHueSetup && (
        <div style={{
          position: "fixed", inset: 0, zIndex: 1000,
          background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)",
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 16,
        }} onClick={() => setShowHueSetup(false)}>
          <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 480 }}>
            <SetupWizard onComplete={() => { setShowHueSetup(false); loadAll(); }} />
            <div style={{ textAlign: "center", marginTop: 12 }}>
              <button
                onClick={() => setShowHueSetup(false)}
                style={{
                  padding: "8px 24px", borderRadius: 10, border: "1px solid #334155",
                  background: "transparent", color: "#94a3b8", fontSize: 13,
                  fontWeight: 600, cursor: "pointer",
                }}
              >Close</button>
            </div>
          </div>
        </div>
      )}
      </main>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
