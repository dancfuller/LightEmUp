<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LightEmUp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1e; overflow-x: hidden; }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: #fff;
      cursor: pointer; border: 2px solid #6366f1;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; cursor: pointer; border: 2px solid #6366f1;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }
    select { -webkit-appearance: auto; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Component files loaded in dependency order -->
  <script type="text/babel" src="js/utils.js"></script>
  <script type="text/babel" src="js/audio.js"></script>
  <script type="text/babel" src="js/components-shared.js"></script>
  <script type="text/babel" src="js/light-card.js"></script>
  <script type="text/babel" src="js/lightning-panel.js"></script>
  <script type="text/babel" src="js/room-map.js"></script>
  <script type="text/babel" src="js/color-mode.js"></script>
  <script type="text/babel" src="js/room-section.js"></script>
  <script type="text/babel" src="js/room-assignment.js"></script>
  <script type="text/babel" src="js/setup-wizard.js"></script>
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
