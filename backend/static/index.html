<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LightEmUp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1e; overflow-x: hidden; }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: #fff;
      cursor: pointer; border: 2px solid #6366f1;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; cursor: pointer; border: 2px solid #6366f1;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }
    select { -webkit-appearance: auto; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes drawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <!-- Instant static loader (pure HTML/CSS, no JS). Shows the moment the page
         paints, covering the gap while the CDN React/Babel scripts download and
         Babel transpiles the ~15 component files in-browser — before React mounts.
         ReactDOM.createRoot(...).render() replaces #root's children on mount, so
         this vanishes into app.js's own loading screen. Kept visually identical
         (pulsing 🔆 + name) so the handoff is seamless, no flash. -->
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0f1e;color:#94a3b8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
      <div style="text-align:center;padding:0 24px;">
        <div style="font-size:48px;margin-bottom:14px;animation:pulse 1.4s ease-in-out infinite;">🔆</div>
        <div style="font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:8px;">LightEmUp</div>
        <div style="font-size:13px;color:#94a3b8;">Starting up…</div>
      </div>
    </div>
  </div>

  <!-- Component files loaded in dependency order -->
  <script type="text/babel" src="js/utils.js"></script>
  <script type="text/babel" src="js/audio.js"></script>
  <script type="text/babel" src="js/components-shared.js"></script>
  <script type="text/babel" src="js/light-card.js"></script>
  <script type="text/babel" src="js/lightning-panel.js"></script>
  <script type="text/babel" src="js/room-map.js"></script>
  <script type="text/babel" src="js/palette-data.js"></script>
  <script type="text/babel" src="js/color-mode.js"></script>
  <script type="text/babel" src="js/segment-reset-debug.js"></script>
  <script type="text/babel" src="js/room-section.js"></script>
  <script type="text/babel" src="js/room-assignment.js"></script>
  <script type="text/babel" src="js/setup-wizard.js"></script>
  <script type="text/babel" src="js/server-logs.js"></script>
  <script type="text/babel" src="js/ct-calibration.js"></script>
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
